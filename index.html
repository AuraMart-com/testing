<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Construction Log</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050508; color: #e0e0e0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00f3ff; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0d0d12; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #1a1a24; padding: 15px; text-align: left; }
        th { background: #16161e; color: #00f3ff; text-transform: uppercase; font-size: 0.85rem; }
        tr:nth-child(even) { background: #11111a; }
        .btn-update { background: #ff00ff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; float: right; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="http://192.168.1.10:8080" class="btn-update">Add New (Local Only)</a>
        <h1>Construction Statements</h1>
        
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="3" style="text-align:center;">Loading statements...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function fetchStatements() {
            try {
                // This fetches the json file from the same folder
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Data file not found');
                
                const data = await response.json();
                const tableBody = document.getElementById('table-body');
                
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No data yet.</td></tr>';
                    return;
                }

                // Generate HTML for each row
                tableBody.innerHTML = data.map(item => `
                    <tr>
                        <td>${item.date}</td>
                        <td>${item.desc}</td>
                        <td>₹${item.amt}</td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error(error);
                document.getElementById('table-body').innerHTML = 
                    '<tr><td colspan="3" style="text-align:center; color:red;">Error: Make sure data.json is uploaded to GitHub.</td></tr>';
            }
        }

        fetchStatements();
    </script>
</body>
</html>
